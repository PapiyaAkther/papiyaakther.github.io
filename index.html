<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Papiya Akther</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f9fafb;
  overflow-x: hidden;
}

/* 🔥 Animated blobs */
.bg-shape {
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  z-index: -1;
  animation: float 10s infinite alternate;
}

.bg1 { background: #60a5fa; top: -100px; left: -100px; }
.bg2 { background: #a78bfa; bottom: -100px; right: -100px; animation-delay: 2s; }

@keyframes float {
  from { transform: translateY(0px); }
  to { transform: translateY(80px); }
}

/* NAV */
.nav {
  position: fixed;
  width: 100%;
  padding: 15px 0;
  backdrop-filter: blur(10px);
}

.container {
  width: 90%;
  max-width: 1100px;
  margin: auto;
}

/* HERO */
.hero {
  text-align: center;
  padding: 150px 20px 100px;
}

.hero h1 {
  font-size: 52px;
  font-weight: 600;
}

.hero p {
  color: #555;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 25px;
  background: #2563eb;
  color: white;
  padding: 14px 30px;
  border-radius: 30px;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* SECTION */
.section {
  padding: 80px 20px;
}

/* GLASS CARD */
.card {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 20px;
  margin-top: 20px;
  transition: 0.4s;
}

/* 🍎 Apple hover */
.card:hover {
  transform: translateY(-15px) scale(1.03);
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 25px;
}

/* FORM */
input, textarea {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 25px;
  right: 25px;
  background: #25D366;
  color: white;
  padding: 18px;
  border-radius: 50%;
  font-size: 22px;
  text-decoration: none;
}

</style>
</head>

<body>

<div class="bg-shape bg1"></div>
<div class="bg-shape bg2"></div>

<div class="nav">
  <div class="container">
    <h3>Dr Papiya Akther</h3>
  </div>
</div>

<div class="hero" data-aos="fade-up">
  <h1>Dr Papiya Akther</h1>
  <p>Pediatrician | 7 Years Experience</p>
  <a href="#appointment" class="btn">Book Appointment</a>
</div>

<div class="section container" data-aos="fade-up">
  <h2>About</h2>
  <div class="card">
    <p>Providing compassionate and advanced pediatric care for children with 7 years of professional experience.</p>
  </div>
</div>

<div class="section container" data-aos="fade-up">
  <h2>Services</h2>
  <div class="grid">
    <div class="card">👶 Child Consultation</div>
    <div class="card">💉 Vaccination</div>
    <div class="card">📊 Growth Monitoring</div>
  </div>
</div>

<div class="section container" data-aos="fade-up">
  <h2>Clinic</h2>
  <div class="card">
    <iframe src="https://www.google.com/maps?q=Al+Haramain+Hospital+Sylhet&output=embed"
    width="100%" height="300" style="border-radius:15px;"></iframe>
  </div>
</div>

<div id="appointment" class="section container" data-aos="fade-up">
  <h2>Book Appointment</h2>
  <div class="card">
    <form action="https://formsubmit.co/aktherpapiya018@gmail.com" method="POST">
      <input type="hidden" name="_captcha" value="false">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="text" name="phone" placeholder="Phone Number" required>
      <textarea name="message" placeholder="Describe your problem"></textarea>
      <button class="btn" type="submit">Submit</button>
    </form>
  </div>
</div>

<a href="https://wa.me/8801601265606" class="whatsapp">💬</a>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init({ duration: 1000 });
</script>

</body>
</html>
